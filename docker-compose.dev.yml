version: '3.5'

services:
  nginx-proxy-automation-web:
    image: nginx:stable-alpine
    labels:
      com.github.jrcs.letsencrypt_nginx_proxy_companion.nginx_proxy: "true"
    container_name: nginx-proxy-automation-web
    restart: always
    ports:
      - "0.0.0.0:80:80"
      - "443:443"
    environment:
      - SSL_POLICY=Mozilla-Intermediate
    volumes:
      - ./data/conf.d:/etc/nginx/conf.d
      - ./data/vhost.d:/etc/nginx/vhost.d
      - ./data/html:/usr/share/nginx/html
      - ./data/certs:/etc/nginx/certs:ro
      - ./data/htpasswd:/etc/nginx/htpasswd:ro
    # logging:
    #   driver: json-file
    #   options:
    #     max-size: 4m
    #     max-file: 10

  nginx-proxy-automation-gen:
    image: nginxproxy/docker-gen:0.7.7
    container_name: nginx-proxy-automation-gen
    restart: always
    volumes:
      - ./data/conf.d:/etc/nginx/conf.d
      - ./data/vhost.d:/etc/nginx/vhost.d
      - ./data/html:/usr/share/nginx/html
      - ./data/certs:/etc/nginx/certs:ro
      - ./data/htpasswd:/etc/nginx/htpasswd:ro
      - ./nginx.tmpl:/etc/docker-gen/templates/nginx.tmpl:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    logging:
      driver: json-file
      options:
        max-size: 2m
        max-file: 10
    command: -notify-sighup nginx-proxy-automation-web -watch -wait 5s:30s /etc/docker-gen/templates/nginx.tmpl /etc/nginx/conf.d/default.conf

  nginx-proxy-automation-letsencrypt:
    image: nginxproxy/acme-companion:2.1
    container_name: nginx-proxy-automation-letsencrypt
    restart: always
    volumes:
      - ./data/conf.d:/etc/nginx/conf.d
      - ./data/vhost.d:/etc/nginx/vhost.d
      - ./data/html:/usr/share/nginx/html
      - ./data/certs:/etc/nginx/certs:rw
      - ./data/acme.sh:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NGINX_DOCKER_GEN_CONTAINER: nginx-proxy-automation-gen
      NGINX_PROXY_CONTAINER: nginx-proxy-automation-web
      DEFAULT_EMAIL: mail@yourdomain.tld
    logging:
      driver: json-file
      options:
        max-size: 2m
        max-file: 10

networks:
  default:
    external: true
    name: proxy
